name: Publish Blog Posts

on:
  push:
    branches: [main]
    paths:
      - "supplement-site/posts/**.md"

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install PyYAML markdown

      - name: Run publish script
        run: python supplement-site/scripts/publish_post.py

      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add supplement-site/blog/ supplement-site/blog.html supplement-site/sitemap.xml
          if git diff --staged --quiet; then
            echo "No new posts to commit."
          else
            git commit -m "Auto-publish blog posts [skip ci]"
            git push
          fi
